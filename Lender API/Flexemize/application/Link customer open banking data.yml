info:
  name: Link customer open banking data.
  type: http
  seq: 3
  tags:
    - application

http:
  method: POST
  url: "{{baseUrl}}/application/:application_id"
  params:
    - name: application_id
      value: ""
      type: path
      description: application_id value returned in in the `/application` response
  body:
    type: json
    data: |-
      {
        "token": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful response from the server
    request:
      url: "{{baseUrl}}/application/:application_id"
      method: POST
      params:
        - name: application_id
          value: ""
          type: path
          description: application_id value returned in in the `/application` response
      body:
        type: json
        data: |-
          {
            "token": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "result": false
          }
  - name: 400 Response
    description: |
      If aplication is not found or user is not set with us to provide AccountScore data, error response is returned.

      If you want to be set up to share AccountScore with Fleximize then please contact us.
    request:
      url: "{{baseUrl}}/application/:application_id"
      method: POST
      params:
        - name: application_id
          value: ""
          type: path
          description: application_id value returned in in the `/application` response
      body:
        type: json
        data: |-
          {
            "token": ""
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "result": false
          }
