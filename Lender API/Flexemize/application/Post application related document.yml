info:
  name: Post application related document
  type: http
  seq: 5
  tags:
    - application
    - documents

http:
  method: POST
  url: "{{baseUrl}}/application/:application_id/upload"
  params:
    - name: application_id
      value: ""
      type: path
      description: application_id value returned in in the `/application` response
  body:
    type: multipart-form
    data:
      - name: document_type
        type: text
        value: ""
        description: One of `id` values returned by `/application/document-types` response
      - name: file
        type: file
        value: []
        description: Document file being uploaded
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK response from server
    request:
      url: "{{baseUrl}}/application/:application_id/upload"
      method: POST
      params:
        - name: application_id
          value: ""
          type: path
          description: application_id value returned in in the `/application` response
      body:
        type: multipart-form
        data:
          - name: document_type
            type: text
            value: ""
            description: One of `id` values returned by `/application/document-types` response
          - name: file
            type: file
            value: []
            description: Document file being uploaded
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Error response from server
    request:
      url: "{{baseUrl}}/application/:application_id/upload"
      method: POST
      params:
        - name: application_id
          value: ""
          type: path
          description: application_id value returned in in the `/application` response
      body:
        type: multipart-form
        data:
          - name: document_type
            type: text
            value: ""
            description: One of `id` values returned by `/application/document-types` response
          - name: file
            type: file
            value: []
            description: Document file being uploaded
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
  - name: 401 Response
    description: Invalid credentials
    request:
      url: "{{baseUrl}}/application/:application_id/upload"
      method: POST
      params:
        - name: application_id
          value: ""
          type: path
          description: application_id value returned in in the `/application` response
      body:
        type: multipart-form
        data:
          - name: document_type
            type: text
            value: ""
            description: One of `id` values returned by `/application/document-types` response
          - name: file
            type: file
            value: []
            description: Document file being uploaded
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
